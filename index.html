<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HESS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
      text-align: center;
    }

    .header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      color: red;
    }

    .hero {
      margin-top: 50px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #aaa;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: red;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: darkred;
    }
  </style>
</head>

<body>

  <div class="header">HESS</div>

  <div class="hero">
    <h1>Добро пожаловать</h1>
    <p>Твой сайт успешно запущен 🚀</p>
    <button class="btn">Начать</button>
  </div>

</body>
</html>

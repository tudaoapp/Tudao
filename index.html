<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hess Marketplace</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      color: #f5d7b2;

      background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
      height: 100vh;
    }

    /* затемнение фона */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: -1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
    }

    .top-controls {
      display: flex;
      gap: 10px;
    }

    .pill {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 8px 14px;
      backdrop-filter: blur(10px);
      font-size: 14px;
      color: #fff;
    }

    main {
      padding: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .card {
      height: 110px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: #f5d7b2;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      transition: 0.2s;
    }

    .card:active {
      transform: scale(0.95);
    }

    .icon {
      font-size: 26px;
      margin-bottom: 8px;
    }

    /* нижний блок */
    .bottom {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .info-card {
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 15px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      font-size: 14px;
    }

    .big {
      font-size: 20px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">Hess Marketplace</div>

  <div class="top-controls">
    <div class="pill">Нячанг</div>
    <div class="pill">☰</div>
  </div>
</header>

<main>

  <div class="grid">

    <a href="./services/index.html" class="card">
      <div class="icon">🛠</div>
      Услуги
    </a>

    <a href="./real-estate/index.html" class="card">
      <div class="icon">🏠</div>
      Жилье
    </a>

    <a href="#" class="card">
      <div class="icon">💼</div>
      Работа
    </a>

    <a href="#" class="card">
      <div class="icon">🍜</div>
      Еда
    </a>

    <a href="#" class="card">
      <div class="icon">📄</div>
      Визаран
    </a>

    <a href="#" class="card">
      <div class="icon">⭐</div>
      Афиша
    </a>

    <a href="#" class="card">
      <div class="icon">💱</div>
      Обменник
    </a>

    <a href="#" class="card">
      <div class="icon">📍</div>
      Локации
    </a>

    <a href="./marketplace/index.html" class="card">
      <div class="icon">🛒</div>
      Маркетплейс
    </a>

    <a href="./excursions/index.html" class="card">
      <div class="icon">🎫</div>
      Экскурсии
    </a>

    <a href="#" class="card">
      <div class="icon">🍸</div>
      Бары
    </a>

    <a href="./bikes/index.html" class="card">
      <div class="icon">🛵</div>
      Аренда
    </a>

  </div>

  <div class="bottom">

    <div class="info-card">
      Курс валют<br>
      <div class="big">1$ = 26 000 VND</div>
    </div>

    <div class="info-card">
      Погода<br>
      <div class="big">+24°</div>
    </div>

  </div>

</main>

</body>
</html>

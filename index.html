<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HESS Marketplace</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    border: 2px solid rgba(0,0,0,0.5);
    border-radius: 10px;
    background: rgba(255,255,255,0.8);
  }

  .header-left, .header-center, .header-right {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header-left, .header-right {
    font-size: 14px;
    text-align: center;
    flex: 1;
    color: black;
  }

  .header-center {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    color: black;
    border: 2px solid rgba(0,0,0,0.5);
    padding: 5px 15px;
    border-radius: 10px;
    flex: 1;
    background: rgba(255,255,255,0.9);
  }

  .content {
    padding: 20px;
  }

  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
  }

  .card {
    background: rgba(0,0,0,0.5);
    width: 200px;
    border-radius: 10px;
    overflow: hidden;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
  }

  .card-title {
    padding: 10px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div id="time">--:--:--</div>
    <div id="flights">Прилетело: --<br>Вылетело: --</div>
  </div>

  <div class="header-center">HESS Marketplace</div>

  <div class="header-right" id="weather">
    Погода: 28°C, влажность 60%
  </div>
</div>

<div class="content">
  <div class="cards">
    <!-- Аренда жилья -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=400&q=80" alt="Аренда жилья">
      <div class="card-title">Аренда жилья</div>
    </div>

    <!-- Аренда байков -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1558981403-c8d6f0cf0c7f?auto=format&fit=crop&w=400&q=80" alt="Аренда байков">
      <div class="card-title">Аренда байков</div>
    </div>

    <!-- Услуги -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1591012911205-daa51c4e1a37?auto=format&fit=crop&w=400&q=80" alt="Услуги">
      <div class="card-title">Услуги</div>
    </div>

    <!-- Объявления -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1581090700227-ff380df03b0d?auto=format&fit=crop&w=400&q=80" alt="Объявления">
      <div class="card-title">Объявления</div>
    </div>

    <!-- Marketplace -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1618354692650-3e3d0677a490?auto=format&fit=crop&w=400&q=80" alt="Marketplace">
      <div class="card-title">Marketplace</div>
    </div>
  </div>
</div>

<script>
  function updateTime() {
    const now = new Date();
    document.getElementById('time').textContent = now.toLocaleTimeString();
  }
  setInterval(updateTime, 1000);
  updateTime();

  document.getElementById('flights').innerHTML = 'Прилетело: 25<br>Вылетело: 18';
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HESS Marketplace</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    /* Рамка по всему сайту */
    .site-border {
      border: 4px solid #fff;
      padding: 10px;
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Верхняя шапка */
    .header {
      background: #111;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      border-bottom: 2px solid #fff;
    }

    /* Контент */
    .content {
      flex: 1;
      padding: 20px;
    }

    /* Футер */
    .footer {
      background: #111;
      padding: 15px 20px;
      border-top: 2px solid #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    /* Карточки Marketplace */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .card {
      background: #111;
      width: 200px;
      margin: 10px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, background 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: scale(1.05);
      background: #222;
    }

    .card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
    }

    .card-title {
      padding: 10px;
      font-weight: bold;
      color: white;
    }
  </style>
</head>

<body>
  <div class="site-border">

    <!-- Верхняя шапка -->
    <div class="header">HESS Marketplace</div>

    <!-- Контент -->
    <div class="content">

      <!-- Карточки -->
      <div class="cards">
        <div class="card">
          <img src="images/villa.jpg" alt="Аренда жилья">
          <div class="card-title">Аренда жилья</div>
        </div>
        <div class="card">
          <img src="images/bike.jpg" alt="Аренда байков">
          <div class="card-title">Аренда байков</div>
        </div>
        <div class="card">
          <img src="images/services.jpg" alt="Услуги">
          <div class="card-title">Услуги</div>
        </div>
        <div class="card">
          <img src="images/ads.jpg" alt="Объявления">
          <div class="card-title">Объявления</div>
        </div>
        <div class="card">
          <img src="images/sneakers.jpg" alt="Маркетплейс">
          <div class="card-title">Маркетплейс (кроссовки / одежда)</div>
        </div>
      </div>

    </div>

    <!-- Футер с погодой и временем -->
    <div class="footer">
      <div id="time">Время: --:--:--</div>
      <div id="weather">Погода: 28°C, влажность 60%</div>
    </div>

  </div>

  <script>
    // Скрипт для отображения текущего времени
    function updateTime() {
      const now = new Date();
      const timeString = now.toLocaleTimeString();
      document.getElementById('time').textContent = 'Время: ' + timeString;
    }
    setInterval(updateTime, 1000);
    updateTime();
  </script>

</body>
</html>

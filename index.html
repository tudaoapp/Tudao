<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HESS Marketplace</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    /* Прямой рабочий фон с пальмами и бунгало */
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.5);
    padding: 15px 20px;
    border-radius: 0 0 10px 10px;
  }

  .header-left, .header-center, .header-right {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header-left, .header-right {
    font-size: 14px;
    text-align: center;
  }

  .header-center {
    font-size: 28px;
    font-weight: bold;
    text-align: center;
  }

  .icon {
    width: 24px;
    vertical-align: middle;
    margin-right: 5px;
  }

  .content {
    padding: 20px;
  }
</style>
</head>
<body>

  <!-- Шапка -->
  <div class="header">
    <div class="header-left">
      <div id="time"><img class="icon" src="https://cdn-icons-png.flaticon.com/512/61/61112.png" alt="Часы"> --:--:--</div>
      <div id="flights">
        Прилетело: --<br>
        Вылетело: --
      </div>
    </div>

    <div class="header-center">HESS Marketplace</div>

    <div class="header-right" id="weather">
      <img class="icon" src="https://cdn-icons-png.flaticon.com/512/1163/1163657.png" alt="Погода">
      Погода: 28°C, влажность 60%
    </div>
  </div>

  <!-- Контент -->
  <div class="content">
    <p>Фон успешно загружен. Дальше будем добавлять карточки с картинками.</p>
  </div>

<script>
  // Время
  function updateTime() {
    const now = new Date();
    document.getElementById('time').textContent = 'Время: ' + now.toLocaleTimeString();
  }
  setInterval(updateTime, 1000);
  updateTime();

  // Прилет/вылет
  function updateFlights() {
    document.getElementById('flights').innerHTML =
      'Прилетело: 25<br>Вылетело: 18';
  }
  updateFlights();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HESS Marketplace</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
}
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background: rgba(0,0,0,0.6);
  position:sticky;
  top:0;
  z-index:1000;
}
header h1 { margin:0; font-size:24px; text-align:center; flex:1; }
header .left, header .right { font-size:14px; }
.sections {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}
.section-card {
  background: rgba(0,0,0,0.7);
  border-radius:10px;
  width:200px;
  text-align:center;
  padding:10px;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor:pointer;
}
.section-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,255,255,0.3);
}
.section-card img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:5px;
  margin-bottom:5px;
}
</style>
</head>
<body>

<header>
  <div class="left" id="weather">Погода: 28°C ☀️</div>
  <h1>HESS Marketplace</h1>
  <div class="right" id="clock"></div>
</header>

<div class="sections">
  <!-- Аренда жилья -->
  <div class="section-card" onclick="location.href='housing.html'">
    <img src="https://images.unsplash.com/photo-1560185127-6a9d3f8f19c2?auto=format&fit=crop&w=220&q=80" alt="Аренда жилья">
    <h3>Аренда жилья</h3>
  </div>

  <!-- Аренда байков -->
  <div class="section-card" onclick="location.href='bikes.html'">
    <img src="https://images.unsplash.com/photo-1600256209485-f88f0f37b5b6?auto=format&fit=crop&w=220&q=80" alt="Аренда байков">
    <h3>Аренда байков</h3>
  </div>

  <!-- Экскурсия -->
  <div class="section-card" onclick="location.href='excursion.html'">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=220&q=80" alt="Экскурсия">
    <h3>Экскурсия</h3>
  </div>

  <!-- Услуги -->
  <div class="section-card" onclick="location.href='services.html'">
    <img src="https://images.unsplash.com/photo-1581091215367-6d7d0652d7a5?auto=format&fit=crop&w=220&q=80" alt="Услуги">
    <h3>Услуги</h3>
  </div>

  <!-- Marketplace -->
  <div class="section-card" onclick="location.href='marketplace.html'">
    <img src="https://images.unsplash.com/photo-1598300050197-1b7c582b7e7b?auto=format&fit=crop&w=220&q=80" alt="Marketplace">
    <h3>Marketplace</h3>
  </div>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>

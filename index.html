<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HESS</title>

<style>
:root {
    --bg: #0f0f10;
    --card: #1c1c1e;
    --border: #2c2c2e;
    --text: #ffffff;
    --sub: #8e8e93;
    --accent: #ff9500;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 50px 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-left {
    font-size: 14px;
    color: var(--sub);
}

.header-right {
    display: flex;
    gap: 12px;
    font-size: 14px;
    color: var(--sub);
}

/* TITLE */
.title {
    text-align: center;
    margin-top: 20px;
}

.title h1 {
    font-size: 42px;
    letter-spacing: 4px;
}

.title p {
    margin-top: 6px;
    color: var(--accent);
    font-size: 14px;
    letter-spacing: 2px;
}

/* GRID BUTTONS */
.grid {
    margin-top: 40px;
    padding: 0 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 90px;
    transition: 0.2s;
}

.card:active {
    transform: scale(0.97);
}

.card-title {
    font-size: 15px;
}

.card-icon {
    font-size: 22px;
}

/* FLOAT BUTTON */
.fab {
    position: fixed;
    right: 16px;
    bottom: 90px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
}

/* BOTTOM NAV */
.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 70px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.bottom div {
    font-size: 20px;
    color: var(--sub);
}

.bottom div.active {
    color: var(--accent);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">+31°C</div>
    <div class="header-right">
        <div>$94.42</div>
        <div>17:42</div>
    </div>
</div>

<!-- TITLE -->
<div class="title">
    <h1>HESS</h1>
    <p>MARKETPLACE</p>
</div>

<!-- GRID -->
<div class="grid">

    <div class="card" onclick="openPage('apartments')">
        <div class="card-icon">🏢</div>
        <div class="card-title">Аренда апартаментов</div>
    </div>

    <div class="card" onclick="openPage('villas')">
        <div class="card-icon">🏡</div>
        <div class="card-title">Аренда вилл</div>
    </div>

    <div class="card" onclick="openPage('bikes')">
        <div class="card-icon">🛵</div>
        <div class="card-title">Аренда байков</div>
    </div>

    <div class="card" onclick="openPage('tours')">
        <div class="card-icon">🌴</div>
        <div class="card-title">Экскурсии</div>
    </div>

</div>

<!-- FLOAT BUTTON -->
<div class="fab">＋</div>

<!-- BOTTOM NAV -->
<div class="bottom">
    <div class="active">🏠</div>
    <div>❤️</div>
    <div>⚙️</div>
    <div>👤</div>
</div>

<script>
function openPage(page) {
    alert("Открываем: " + page);
}
</script>

</body>
</html>

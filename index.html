<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HESS Marketplace</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: white;
    overflow: hidden;

    /* 🔥 ВСТАВЬ СВОЮ КАРТИНКУ */
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.6),
        rgba(0,0,0,0.9)
    ),
    url('https://images.unsplash.com/photo-1506929562872-bb421503ef21') center/cover no-repeat;
}

/* 🔝 TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    padding: env(safe-area-inset-top) 15px 10px;
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 8px 14px;
    font-size: 14px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

.top-left {
    display: flex;
}

.top-right {
    display: flex;
    gap: 10px;
}

/* 🧠 CENTER */
.center {
    text-align: center;
    margin-top: -20px;
}

.title {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

.subtitle {
    font-size: 18px;
    margin-top: 8px;
    letter-spacing: 2px;
    color: #ffb347;
    opacity: 0.9;
}

/* 🔘 BUTTONS */
.buttons {
    padding: 0 15px calc(30px + env(safe-area-inset-bottom));
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.button {
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 15px;
    border: 1px solid rgba(255,255,255,0.2);

    /* 🔥 СВЕЧЕНИЕ */
    box-shadow:
        0 10px 30px rgba(0,0,0,0.5),
        0 0 20px rgba(255,140,0,0.2);

    transition: 0.25s;
}

.button:hover {
    transform: scale(1.03);
}

.button:active {
    transform: scale(0.96);
    box-shadow:
        0 5px 15px rgba(0,0,0,0.6),
        0 0 25px rgba(255,140,0,0.4);
}

/* ✨ ИКОНКИ */
.icon {
    margin-right: 10px;
    filter: drop-shadow(0 0 5px rgba(255,140,0,0.6));
}

/* 📱 MOBILE */
@media (max-width: 400px) {
    .title {
        font-size: 42px;
    }
}
</style>
</head>

<body>

<!-- 🔝 TOP -->
<div class="top-bar">
    <div class="top-left">
        <div class="glass">🌤 +31°C</div>
    </div>

    <div class="top-right">
        <div class="glass">$ 94.42</div>
        <div class="glass">17:42</div>
    </div>
</div>

<!-- 🧠 CENTER -->
<div class="center">
    <div class="title">HESS</div>
    <div class="subtitle">Marketplace</div>
</div>

<!-- 🔘 BUTTONS -->
<div class="buttons">
    <div class="grid">

        <div class="button" onclick="go('apartments')">
            <div><span class="icon">🏢</span>Аренда апартаментов</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('villas')">
            <div><span class="icon">🏡</span>Аренда вилл</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('bikes')">
            <div><span class="icon">🛵</span>Аренда байков</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('tours')">
            <div><span class="icon">🌴</span>Экскурсии</div>
            <div>›</div>
        </div>

    </div>
</div>

<script>
function go(type) {
    alert("Открыть: " + type);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HESS</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    color: white;
    background: url('bg.jpg') center/cover no-repeat;
}

/* затемнение */
.overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25),
        rgba(0,0,0,0.6)
    );
}

/* 🔝 ВЕРХ */
.top {
    position: absolute;
    top: 50px;
    left: 15px;
    right: 15px;
    display: flex;
    justify-content: space-between;
}

.glass {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 14px;
}

/* центр сверху */
.top-center {
    position: absolute;
    top: 45px;
    left: 50%;
    transform: translateX(-50%);
}

.top-center .glass {
    padding: 6px 25px;
    text-align: center;
}

.top-center small {
    display: block;
    font-size: 11px;
    opacity: 0.7;
}

/* 🧠 ЦЕНТР */
.center {
    position: absolute;
    top: 34%;
    width: 100%;
    text-align: center;
}

.title {
    font-size: 54px;
    font-weight: 600;
    letter-spacing: 4px;
}

.subtitle {
    margin-top: 8px;
    font-size: 18px;
    letter-spacing: 3px;
    color: #ffb347;
}

/* 🔘 КНОПКИ */
.buttons {
    position: absolute;
    bottom: 24%;
    width: 100%;
    padding: 0 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.btn {
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.2);

    display: flex;
    justify-content: space-between;
    align-items: center;

    font-size: 15px;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.6),
        inset 0 -10px 25px rgba(255,140,0,0.25);
}

.left {
    display: flex;
    gap: 10px;
    align-items: center;
}

/* ⚙️ FLOAT */
.float {
    position: absolute;
    right: 15px;
    bottom: 19%;
    width: 50px;
    height: 50px;
    border-radius: 50%;

    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔻 НИЗ */
.bottom {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    height: 60px;

    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.1);
    border-radius: 30px;

    display: flex;
    justify-content: space-around;
    align-items: center;
}
</style>
</head>

<body>

<div class="overlay"></div>

<!-- верх -->
<div class="top">
    <div class="glass">🌤 +31°C</div>

    <div style="display:flex; gap:10px;">
        <div class="glass">$ 94.42</div>
        <div class="glass">17:42</div>
    </div>
</div>

<div class="top-center">
    <div class="glass">
        Сегодня
        <small>22:22</small>
    </div>
</div>

<!-- центр -->
<div class="center">
    <div class="title">HESS</div>
    <div class="subtitle">Marketplace</div>
</div>

<!-- кнопки -->
<div class="buttons">
    <div class="grid">

        <div class="btn">
            <div class="left">🏢 Аренда апартаментов</div>
            <div>›</div>
        </div>

        <div class="btn">
            <div class="left">🏡 Аренда вилл</div>
            <div>›</div>
        </div>

        <div class="btn">
            <div class="left">🛵 Аренда байков</div>
            <div>›</div>
        </div>

        <div class="btn">
            <div class="left">🌴 Экскурсии</div>
            <div>›</div>
        </div>

    </div>
</div>

<div class="float">⚙️</div>

<!-- низ -->
<div class="bottom">
    <div>📤</div>
    <div>❤️</div>
    <div>ℹ️</div>
    <div>⚙️</div>
    <div>🗑️</div>
</div>

</body>
</html>

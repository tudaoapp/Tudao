<!DOCTYPE html>
<html>
<head>
  <title>Tudao</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-decoration: none;
      color: black;
    }

    .card:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

<header>🚀 Tudao</header>

<div class="grid">

  <a class="card" href="#">🏠 Аренда жилья</a>
  <a class="card" href="#">🏢 Аренда квартир</a>
  <a class="card" href="#">🏍 Аренда байков</a>
  <a class="card" href="#">🛍 Marketplace</a>
  <a class="card" href="#">💬 Поддержка</a>

</div>

</body>
</html>

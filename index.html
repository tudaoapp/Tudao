<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аренда недвижимости</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: url('../bg.jpg') center/cover no-repeat;
  color: #fff;
}

.overlay {
  backdrop-filter: blur(10px);
  min-height: 100vh;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.back {
  color: #fff;
  text-decoration: none;
}

.cards {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 20px;
}

.card img {
  width: 100%;
  border-radius: 15px;
}

.buttons {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 10px;
  text-decoration: none;
  color: #fff;
  background: rgba(255,255,255,0.15);
}
</style>
</head>

<body>
<div class="overlay">

<div class="header">
  <a href="../index.html" class="back">← Назад</a>
  <div>Аренда недвижимости</div>
  <div>🌤 +24° 💲 1$=26000</div>
</div>

<div class="cards">

<div class="card">
  <img src="https://via.placeholder.com/400x200">
  <h3>Квартира у моря</h3>
  <p>2 спальни, 300м до пляжа</p>
  <b>$500 / месяц</b>
  <div class="buttons">
    <a class="btn" href="https://wa.me/79999999999">WhatsApp</a>
    <a class="btn" href="https://t.me/username">Telegram</a>
  </div>
</div>

<div class="card">
  <img src="https://via.placeholder.com/400x200">
  <h3>Вилла с бассейном</h3>
  <p>Большая территория</p>
  <b>$1200 / месяц</b>
  <div class="buttons">
    <a class="btn" href="#">WhatsApp</a>
    <a class="btn" href="#">Telegram</a>
  </div>
</div>

</div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hess Marketplace</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      color: #f5d7b2;

      background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
      height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: -1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
    }

    .top-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 7px 12px;
      backdrop-filter: blur(10px);
      font-size: 12px;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }

    main {
      padding: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .card {
      height: 110px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: #f5d7b2;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      transition: 0.2s;
    }

    .card:active {
      transform: scale(0.95);
    }

    .icon {
      font-size: 26px;
      margin-bottom: 8px;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">Hess Marketplace</div>

  <div class="top-controls">
    <div class="pill">🌤 +24°</div>
    <div class="pill">$ 26 000</div>
    <div class="pill">Фукуок</div>
    <div class="pill">☰</div>
  </div>
</header>

<main>

  <div class="grid">

    <!-- 1 -->
    <a href="./services/index.html" class="card">
      <div class="icon">🛠</div>
      Услуги
    </a>

    <a href="./real-estate/index.html" class="card">
      <div class="icon">🏠</div>
      Аренда недвижимости 
    </a>

    <!-- 2 -->
    <a href="./jobs/index.html" class="card">
      <div class="icon">💼</div>
      Работа
    </a>

    <a href="./food/index.html" class="card">
      <div class="icon">🍜</div>
      Еда
    </a>

    <!-- 3 -->
    <a href="./visa/index.html" class="card">
      <div class="icon">📄</div>
      Визы
    </a>

    <a href="./events/index.html" class="card">
      <div class="icon">⭐</div>
      Афиша
    </a>

    <!-- 4 -->
    <a href="./exchange/index.html" class="card">
      <div class="icon">💱</div>
      Обмен валют
    </a>

    <a href="./locations/index.html" class="card">
      <div class="icon">📍</div>
      Локации
    </a>

    <!-- 5 -->
    <a href="./marketplace/index.html" class="card">
      <div class="icon">🛒</div>
      Маркетплейс
    </a>

    <a href="./excursions/index.html" class="card">
      <div class="icon">🎫</div>
      Экскурсии
    </a>

    <!-- 6 -->
    <a href="./bars/index.html" class="card">
      <div class="icon">🍸</div>
      Бары
    </a>

    <a href="./bikes/index.html" class="card">
      <div class="icon">🛵</div>
      Аренда байков
    </a>

  </div>

</main>

</body>
</html>

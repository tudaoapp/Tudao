<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hess Marketplace</title>

  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1c1c1e;
      --muted: #8e8e93;
      --border: #e5e5ea;
      --accent: #007aff;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: var(--bg);
      color: var(--text);
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      background: var(--card);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    .title {
      font-size: 17px;
      font-weight: 600;
    }

    .top-right {
      display: flex;
      gap: 8px;
    }

    .chip {
      font-size: 12px;
      background: #f2f2f7;
      padding: 6px 10px;
      border-radius: 20px;
      color: var(--muted);
    }

    /* MAIN */
    main {
      padding: 12px;
      max-width: 500px;
      margin: 0 auto;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* CARD STYLE (как viethelper) */
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      padding: 16px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      transition: all 0.15s ease;
    }

    .item:active {
      transform: scale(0.98);
      background: #f9f9f9;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .text {
      font-size: 15px;
      font-weight: 500;
    }

    .arrow {
      color: var(--muted);
      font-size: 16px;
    }

  </style>
</head>
<body>

<header>
  <div class="title">Hess Marketplace</div>

  <div class="top-right">
    <div class="chip">🌤 28°C</div>
    <div class="chip">$ 90₽</div>
  </div>
</header>

<main>

  <div class="list">

    <a href="./real-estate/index.html" class="item">
      <div class="left">
        <div class="icon">🏠</div>
        <div class="text">Аренда недвижимости</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a href="./bikes/index.html" class="item">
      <div class="left">
        <div class="icon">🏍</div>
        <div class="text">Аренда байков</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a href="./excursions/index.html" class="item">
      <div class="left">
        <div class="icon">🌴</div>
        <div class="text">Экскурсии</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a href="./services/index.html" class="item">
      <div class="left">
        <div class="icon">🛠</div>
        <div class="text">Услуги</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a href="./marketplace/index.html" class="item">
      <div class="left">
        <div class="icon">🛒</div>
        <div class="text">Маркетплейс</div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

</main>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аренда жилья</title>
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#1c1c1c; color:#fff; }
.button-back { display:inline-block; margin-bottom:20px; padding:8px 15px; background:#555; color:#fff; text-decoration:none; border-radius:5px; }
.button-back:hover { background:#333; }
.catalog { display:flex; flex-wrap:wrap; gap:15px; }
.card { background:#333; border-radius:5px; padding:10px; width:250px; box-shadow:0 0 5px rgba(255,255,255,0.2); cursor:pointer; }
.card img { width:100%; height:150px; object-fit:cover; border-radius:5px; margin-bottom:5px; }
.card .gallery img { width:60px; height:60px; object-fit:cover; margin:2px; border-radius:3px; }
input,textarea,button { width:100%; margin-top:5px; padding:8px; border-radius:5px; border:none; }
button, .button { cursor:pointer; background:#007bff; color:#fff; text-align:center; margin-top:10px; display:block; text-decoration:none; }
button:hover, .button:hover { background:#0056b3; }
</style>
</head>
<body>

<a href="index.html" class="button-back">← Назад</a>
<h1>Аренда жилья</h1>

<div class="catalog" id="catalogContainer"></div>

<hr>
<h2>Добавить новое объявление</h2>

<input type="text" id="title" placeholder="Заголовок">
<input type="file" id="photos" multiple accept="image/*">
<div id="preview"></div>
<textarea id="description" rows="4" placeholder="Описание"></textarea>
<input type="text" id="price" placeholder="Цена">
<input type="text" id="location" placeholder="Локация">
<input type="text" id="contact" placeholder="Контакты">
<button id="createCard">Добавить карточку</button>

<script>
const photosInput = document.getElementById('photos');
const preview = document.getElementById('preview');
const catalog = document.getElementById('catalogContainer');

let cardsData = JSON.parse(localStorage.getItem('housingCards')) || [];

// Предустановленные объявления с картинками
if(cardsData.length === 0){
  cardsData = [
    {title:'Дом у моря', description:'Красивый дом с видом на пляж', price:'200$ в сутки', location:'Вьетнам, Дананг', contact:'+84123456789', photos:['https://images.unsplash.com/photo-1560185127-6a9d3f8f19c2?auto=format&fit=crop&w=400&q=80']},
    {title:'Коттедж с бассейном', description:'Уютный коттедж для семьи', price:'150$ в сутки', location:'Вьетнам, Хойан', contact:'+84123456789', photos:['https://images.unsplash.com/photo-1570129477492-45c003edd2be?auto=format&fit=crop&w=400&q=80']}
  ];
}

function renderCards() {
  catalog.innerHTML = '';
  cardsData.forEach(cardData => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = ()=>alert('Открытие подробной страницы объявления');

    if(cardData.photos.length) {
      const mainImg = document.createElement('img');
      mainImg.src = cardData.photos[0];
      card.appendChild(mainImg);
    }

    const h3 = document.createElement('h3');
    h3.textContent = cardData.title;
    card.appendChild(h3);

    const pDesc = document.createElement('p');
    pDesc.textContent = cardData.description;
    card.appendChild(pDesc);

    const pPrice = document.createElement('p'); pPrice.innerHTML = `<strong>Цена:</strong> ${cardData.price}`;
    card.appendChild(pPrice);

    const pLoc = document.createElement('p'); pLoc.innerHTML = `<strong>Локация:</strong> ${cardData.location}`;
    card.appendChild(pLoc);

    const pContact = document.createElement('p'); pContact.innerHTML = `<strong>Контакты:</strong> ${cardData.contact}`;
    card.appendChild(pContact);

    if(cardData.photos.length>1){
      const galleryDiv=document.createElement('div'); galleryDiv.className='gallery';
      cardData.photos.slice(1).forEach(photo=>{
        const img=document.createElement('img'); img.src=photo; galleryDiv.appendChild(img);
      });
      card.appendChild(galleryDiv);
    }

    // Кнопки WhatsApp и Telegram
    const waBtn=document.createElement('a'); waBtn.href='https://wa.me/123456789'; waBtn.target='_blank'; waBtn.textContent='WhatsApp'; waBtn.className='button';
    const tgBtn=document.createElement('a'); tgBtn.href='https://t.me/username'; tgBtn.target='_blank'; tgBtn.textContent='Telegram'; tgBtn.className='button';
    card.appendChild(waBtn); card.appendChild(tgBtn);

    catalog.appendChild(card);
  });
}

photosInput.addEventListener('change', ()=>{
  preview.innerHTML='';
  Array.from(photosInput.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=document.createElement('img'); img.src=e.target.result; img.style.width='60px'; img.style.margin='2px'; preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

document.getElementById('createCard').addEventListener('click', ()=>{
  const title=document.getElementById('title').value.trim();
  const desc=document.getElementById('description').value.trim();
  const price=document.getElementById('price').value.trim();
  const loc=document.getElementById('location').value.trim();
  const contact=document.getElementById('contact').value.trim();
  if(!title||!desc||!price||!loc||!contact){ alert('Заполните все поля!'); return; }
  const photos=Array.from(photosInput.files).map(f=>URL.createObjectURL(f));
  cardsData.push({title,description:desc,price,location:loc,contact,photos});
  localStorage.setItem('housingCards', JSON.stringify(cardsData));
  renderCards();
  document.getElementById('title').value=''; document.getElementById('description').value='';
  document.getElementById('price').value=''; document.getElementById('location').value=''; document.getElementById('contact').value='';
  photosInput.value=''; preview.innerHTML='';
});

renderCards();
</script>

</body>
</html>

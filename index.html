<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HESS Marketplace</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    height: 100vh;
    position: relative;
    color: white;
    overflow: hidden;

    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.65),
        rgba(0,0,0,0.95)
    ),
    url('https://images.unsplash.com/photo-1505691938895-1758d7feb511?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
}

/* 🔝 TOP */
.top-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 10px) 15px 0;
}

.glass {
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 8px 14px;
    font-size: 14px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

.top-right {
    display: flex;
    gap: 10px;
}

/* 🧠 CENTER */
.center {
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
}

.title {
    font-size: 54px;
    font-weight: 700;
    letter-spacing: 5px;
    text-shadow: 0 15px 60px rgba(0,0,0,0.9);
}

.subtitle {
    font-size: 18px;
    margin-top: 10px;
    letter-spacing: 4px;
    color: #ff9a3c;
    text-shadow: 0 0 20px rgba(255,150,50,0.7);
}

/* 🔘 BUTTONS — ВОТ ТУТ ГЛАВНОЕ ИЗМЕНЕНИЕ */
.buttons {
    position: absolute;
    bottom: 18%; /* 🔥 ПОДНЯЛ ВЫШЕ */
    width: 100%;
    padding: 0 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.button {
    backdrop-filter: blur(30px);
    background: rgba(255,255,255,0.06);
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 18px;

    display: flex;
    align-items: center;
    justify-content: space-between;

    font-size: 15px;

    box-shadow:
        0 15px 40px rgba(0,0,0,0.6),
        0 0 25px rgba(255,140,0,0.25),
        inset 0 -12px 30px rgba(255,140,0,0.18);

    transition: 0.25s;
}

.button:active {
    transform: scale(0.95);
    box-shadow:
        0 10px 25px rgba(0,0,0,0.7),
        0 0 30px rgba(255,140,0,0.4);
}

.text {
    display: flex;
    align-items: center;
    gap: 10px;
}

.icon {
    font-size: 18px;
    filter: drop-shadow(0 0 8px rgba(255,140,0,0.8));
}
</style>
</head>

<body>

<!-- 🔝 TOP -->
<div class="top-bar">
    <div class="glass">🌤 +31°C</div>
    <div class="top-right">
        <div class="glass">$ 94.42</div>
        <div class="glass">17:42</div>
    </div>
</div>

<!-- 🧠 CENTER -->
<div class="center">
    <div class="title">HESS</div>
    <div class="subtitle">Marketplace</div>
</div>

<!-- 🔘 BUTTONS -->
<div class="buttons">
    <div class="grid">

        <div class="button" onclick="go('apartments')">
            <div class="text"><span class="icon">🏢</span>Аренда апартаментов</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('villas')">
            <div class="text"><span class="icon">🏡</span>Аренда вилл</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('bikes')">
            <div class="text"><span class="icon">🛵</span>Аренда байков</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('tours')">
            <div class="text"><span class="icon">🌴</span>Экскурсии</div>
            <div>›</div>
        </div>

    </div>
</div>

<script>
function go(type) {
    alert("Открыть: " + type);
}
</script>

</body>
</html>

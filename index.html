<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HEES</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #000;
    }

    /* HERO */
    .hero {
      height: 260px;
      background: url("https://images.unsplash.com/photo-1505693416388-ac5ce068fe85") center/cover no-repeat;
      position: relative;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #fff;
    }

    .overlay h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 600;
    }

    .overlay p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    /* CARDS */
    .cards {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: 0.2s;
      background: #fff;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 14px;
    }

    .card-content h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .card-content p {
      margin: 6px 0 0;
      color: #777;
      font-size: 13px;
    }

    /* BOTTOM NAV */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .nav-item {
      font-size: 12px;
      color: #777;
    }

    .nav-item.active {
      color: #000;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div class="overlay">
      <h1>HEES</h1>
      <p>Аренда и продажа недвижимости на Фукуоке</p>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards">

    <div class="card" onclick="go('rent')">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c"/>
      <div class="card-content">
        <h3>Аренда</h3>
        <p>Подбор жилья</p>
      </div>
    </div>

    <div class="card" onclick="go('sale')">
      <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c"/>
      <div class="card-content">
        <h3>Продажа</h3>
        <p>Покупка недвижимости</p>
      </div>
    </div>

    <div class="card" onclick="go('bikes')">
      <img src="https://images.unsplash.com/photo-1558981403-c5f9891a2b06"/>
      <div class="card-content">
        <h3>Байки</h3>
        <p>Аренда байков</p>
      </div>
    </div>

    <div class="card" onclick="go('tours')">
      <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"/>
      <div class="card-content">
        <h3>Экскурсии</h3>
        <p>Лучшие туры</p>
      </div>
    </div>

  </div>

  <!-- NAV -->
  <div class="nav">
    <div class="nav-item active">Главная</div>
    <div class="nav-item">Аренда</div>
    <div class="nav-item">Продажа</div>
    <div class="nav-item">Байки</div>
    <div class="nav-item">Туры</div>
  </div>

  <script>
    function go(page) {
      alert("Переход в раздел: " + page);
      // позже заменим на реальные страницы
    }
  </script>

</body>
</html>

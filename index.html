<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HESS Marketplace</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
  color: white;
}

/* затемнение */
.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding: 15px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 15px;
  padding: 10px;
  background: rgba(0,0,0,0.5);
}

/* левая часть (погода) */
.header-left {
  font-size: 14px;
}

/* центр */
.header-center {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
}

/* правая часть (время) */
.header-right {
  font-size: 14px;
  text-align: right;
}

/* КАРТОЧКИ */
.cards {
  margin-top: 25px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:active {
  transform: scale(0.95);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card-title {
  padding: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="overlay">

  <!-- HEADER -->
  <div class="header">

    <!-- Погода -->
    <div class="header-left">
      🌤 <span id="weather">28°C</span>
    </div>

    <!-- Название -->
    <div class="header-center">
      HESS Marketplace
    </div>

    <!-- Время -->
    <div class="header-right">
      <div id="time">--:--</div>
      <div>Phu Quoc</div>
    </div>

  </div>

  <!-- КАРТОЧКИ -->
  <div class="cards">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
      <div class="card-title">Аренда жилья</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1558981285-6f0c94958bb6">
      <div class="card-title">Аренда байков</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <div class="card-title">Услуги</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1581090700227-ff380df03b0d">
      <div class="card-title">Объявления</div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
      <div class="card-title">Marketplace</div>
    </div>

  </div>

</div>

<script>
// ВРЕМЯ
function updateTime() {
  const now = new Date();
  const time = now.toLocaleTimeString('ru-RU');
  document.getElementById('time').textContent = time;
}
setInterval(updateTime, 1000);
updateTime();

// ПРИМЕР ПОГОДЫ (потом подключим API)
document.getElementById('weather').textContent = "29°C";
</script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>

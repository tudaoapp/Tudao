<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HESS Marketplace</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    color: white;

    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.65),
        rgba(0,0,0,0.95)
    ),
    url('https://images.unsplash.com/photo-1505691938895-1758d7feb511?q=80&w=1974&auto=format&fit=crop') center/cover no-repeat;
}

/* 🔝 TOP BAR */
.top-bar {
    position: absolute;
    top: 0;
    width: 100%;
    padding: calc(env(safe-area-inset-top) + 8px) 12px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.glass {
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 16px;
    padding: 6px 12px;
    font-size: 13px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

/* центр верх */
.top-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: calc(env(safe-area-inset-top) + 5px);
    text-align: center;
}

.top-center .glass {
    padding: 6px 20px;
}

.top-center small {
    display: block;
    font-size: 11px;
    opacity: 0.8;
}

/* 🧠 CENTER */
.center {
    position: absolute;
    top: 34%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
}

.title {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 5px;
    text-shadow: 0 15px 60px rgba(0,0,0,0.9);
}

.subtitle {
    margin-top: 10px;
    font-size: 18px;
    letter-spacing: 4px;
    color: #ffb347;
    text-shadow: 0 0 20px rgba(255,150,50,0.8);
}

/* 🔘 BUTTONS */
.buttons {
    position: absolute;
    bottom: 22%;
    width: 100%;
    padding: 0 15px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.button {
    backdrop-filter: blur(30px);
    background: rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.15);

    display: flex;
    justify-content: space-between;
    align-items: center;

    font-size: 14px;

    box-shadow:
        0 10px 35px rgba(0,0,0,0.6),
        0 0 25px rgba(255,140,0,0.3),
        inset 0 -10px 25px rgba(255,140,0,0.2);
}

.button:active {
    transform: scale(0.95);
}

.text {
    display: flex;
    gap: 8px;
    align-items: center;
}

.icon {
    filter: drop-shadow(0 0 8px orange);
}

/* 🔘 FLOAT BUTTON */
.float-btn {
    position: absolute;
    right: 15px;
    bottom: 18%;
    width: 50px;
    height: 50px;
    border-radius: 50%;

    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    display: flex;
    justify-content: center;
    align-items: center;

    border: 1px solid rgba(255,255,255,0.2);
}

/* 🔻 BOTTOM BAR */
.bottom-bar {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);

    width: 90%;
    height: 60px;

    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.08);
    border-radius: 30px;

    display: flex;
    justify-content: space-around;
    align-items: center;
}

.bottom-icon {
    font-size: 20px;
    opacity: 0.9;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top-bar">
    <div class="glass">🌤 +31°C</div>

    <div class="glass">$ 94.42</div>
    <div class="glass">17:42</div>
</div>

<div class="top-center">
    <div class="glass">
        Сегодня
        <small>22:22</small>
    </div>
</div>

<!-- CENTER -->
<div class="center">
    <div class="title">HESS</div>
    <div class="subtitle">Marketplace</div>
</div>

<!-- BUTTONS -->
<div class="buttons">
    <div class="grid">

        <div class="button">
            <div class="text"><span class="icon">🏢</span>Аренда апартаментов</div>
            <div>›</div>
        </div>

        <div class="button">
            <div class="text"><span class="icon">🏡</span>Аренда вилл</div>
            <div

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HESS Marketplace</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .header {
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      background: #111;
      color: white;
    }

    /* Контейнер карточек */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      padding: 20px;
    }

    /* Одна карточка */
    .card {
      background: #111;
      width: 220px;
      margin: 10px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, background 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: scale(1.05);
      background: #222;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }

    .card-title {
      padding: 15px;
      font-size: 16px;
      font-weight: bold;
      color: white;
    }

    /* Новости */
    .news {
      margin: 20px;
      padding: 20px;
      background: #111;
      border-radius: 10px;
    }

    .news h2 {
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #555;
      padding-bottom: 5px;
    }

    .news-item {
      padding: 10px 0;
      border-bottom: 1px solid #333;
    }

    .news-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>

  <div class="header">HESS Marketplace</div>

  <!-- Карточки с картинками и кнопками -->
  <div class="cards">
    <div class="card">
      <img src="images/villa.jpg" alt="Аренда жилья">
      <div class="card-title">Аренда жилья</div>
    </div>
    <div class="card">
      <img src="images/bike.jpg" alt="Аренда байков">
      <div class="card-title">Аренда байков</div>
    </div>
    <div class="card">
      <img src="images/services.jpg" alt="Услуги">
      <div class="card-title">Услуги</div>
    </div>
    <div class="card">
      <img src="images/ads.jpg" alt="Объявления">
      <div class="card-title">Объявления</div>
    </div>
    <div class="card">
      <img src="images/sneakers.jpg" alt="Маркетплейс">
      <div class="card-title">Маркетплейс (кроссовки / одежда)</div>
    </div>
  </div>

  <!-- Новости Фукуока -->
  <div class="news">
    <h2>Новости Фукуока</h2>
    <div class="news-item">Новое кафе открылось в центре острова</div>
    <div class="news-item">Новая услуга по аренде электросамокатов</div>
    <div class="news-item">Скидки на жильё в районе Онланг</div>
  </div>

</body>
</html>

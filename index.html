<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hess Marketplace</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #222;

      /* НОВЫЙ ФОН */
      background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      position: relative;
    }

    /* overlay как в travel сайтах */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(30,136,229,0.6),
        rgba(255,255,255,0.85)
      );
      z-index: -1;
    }

    /* HEADER */

    header {
      background: transparent;
      color: white;
      padding: 20px 15px 25px;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
    }

    .top-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .pill {
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      color: #fff;
      backdrop-filter: blur(6px);
    }

    /* MAIN */

    main {
      padding: 15px;
      margin-top: 10px;
    }

    /* GRID */

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    /* CARD */

    .card {
      background: rgba(255,255,255,0.9);
      border-radius: 18px;
      padding: 18px 12px;
      text-align: center;
      text-decoration: none;
      color: #222;
      font-size: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .card:active {
      transform: scale(0.96);
    }

    .card:hover {
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
    }

    .icon {
      font-size: 30px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">Hess Marketplace</div>

  <div class="top-controls">
    <div class="pill">🌤 +24°</div>
    <div class="pill">$ 26 000</div>
    <div class="pill">Фукуок</div>
    <div class="pill">☰</div>
  </div>
</header>

<main>

  <div class="grid">

    <a href="./real-estate/index.html" class="card">
      <div class="icon">🏠</div>
      Аренда недвижимости
    </a>

    <a href="./bikes/index.html" class="card">
      <div class="icon">🛵</div>
      Аренда байков
    </a>

  </div>

</main>

</body>
</html>

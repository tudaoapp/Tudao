<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HESS Marketplace</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: white;
    overflow: hidden;

    /* 🔥 ФОН (замени ссылку на свою картинку) */
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.3),
        rgba(0,0,0,0.6)
    ),
    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover no-repeat;
}

/* 🔝 TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    padding: env(safe-area-inset-top) 15px 10px;
}

.top-left, .top-right {
    display: flex;
    gap: 10px;
}

.glass {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 14px;
}

/* 🧠 CENTER */
.center {
    text-align: center;
    margin-top: -40px;
}

.title {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 3px;
    text-shadow: 0 5px 25px rgba(0,0,0,0.5);
}

.subtitle {
    font-size: 18px;
    opacity: 0.7;
    margin-top: 5px;
}

/* 🔘 BUTTONS */
.buttons {
    padding: 0 15px calc(20px + env(safe-area-inset-bottom));
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.button {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 18px;
    padding: 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 16px;
    transition: 0.2s;
    cursor: pointer;
}

.button:hover {
    transform: scale(1.02);
}

.button:active {
    transform: scale(0.97);
}

.icon {
    margin-right: 10px;
}

/* 📱 MOBILE FIX */
@media (max-width: 400px) {
    .title {
        font-size: 38px;
    }
}
</style>
</head>

<body>

<!-- 🔝 TOP -->
<div class="top-bar">
    <div class="top-left">
        <div class="glass">🌤 +31°C</div>
    </div>

    <div class="top-right">
        <div class="glass">$ 94.42</div>
        <div class="glass">17:42</div>
    </div>
</div>

<!-- 🧠 CENTER -->
<div class="center">
    <div class="title">HESS</div>
    <div class="subtitle">Marketplace</div>
</div>

<!-- 🔘 BUTTONS -->
<div class="buttons">
    <div class="grid">

        <div class="button" onclick="go('apartments')">
            <div>🏢 Аренда апартаментов</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('villas')">
            <div>🏡 Аренда вилл</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('bikes')">
            <div>🛵 Аренда байков</div>
            <div>›</div>
        </div>

        <div class="button" onclick="go('tours')">
            <div>🌴 Экскурсии</div>
            <div>›</div>
        </div>

    </div>
</div>

<script>
function go(type) {
    alert("Открыть раздел: " + type);
    // потом заменим на переход:
    // window.location.href = "/apartments.html";
}
</script>

</body>
</html>

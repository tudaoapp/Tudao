<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аренда недвижимости</title>
<style>
body { font-family: Arial, sans-serif; padding:20px; background:#f5f5f5; }
.button-back { display:inline-block; margin-bottom:20px; padding:8px 15px; background:#555; color:#fff; text-decoration:none; border-radius:5px; }
.button-back:hover { background:#333; }
h1,h2 { margin-bottom:20px; }
.catalog { display:flex; flex-wrap:wrap; gap:15px; }
.card { background:#fff; border-radius:5px; padding:10px; width:250px; box-shadow:0 0 5px rgba(0,0,0,0.1); }
.card img { width:100%; height:150px; object-fit:cover; border-radius:5px; margin-bottom:5px; }
.card .gallery img { width:60px; height:60px; object-fit:cover; margin:2px; border-radius:3px; }
.form-group { margin-bottom:15px; }
input[type=text],textarea,input[type=file] { width:100%; padding:8px; box-sizing:border-box; }
button, .button { padding:10px 20px; font-size:16px; cursor:pointer; margin-top:10px; text-align:center; border:none; }
.button { display:block; background:#007bff; color:#fff; border-radius:5px; text-decoration:none; }
.button:hover { background:#0056b3; }
</style>
</head>
<body>

<a href="index.html" class="button-back">← Назад на главную</a>
<h1>Аренда недвижимости</h1>

<div class="catalog" id="catalogContainer"></div>

<hr>
<h2>Загрузить новое объявление</h2>

<div class="form-group">
  <label for="title">Заголовок</label>
  <input type="text" id="title" placeholder="Например: Уютный дом у моря">
</div>

<div class="form-group">
  <label for="photos">Фотографии</label>
  <input type="file" id="photos" multiple accept="image/*">
  <div class="gallery" id="preview"></div>
</div>

<div class="form-group">
  <label for="description">Описание</label>
  <textarea id="description" rows="5" placeholder="Подробное описание жилья"></textarea>
</div>

<div class="form-group">
  <label for="price">Цена</label>
  <input type="text" id="price" placeholder="Например: 20 000 000 VND / месяц">
</div>

<div class="form-group">
  <label for="location">Локация</label>
  <input type="text" id="location" placeholder="Город, район">
</div>

<div class="form-group">
  <label for="contact">Контакты</label>
  <input type="text" id="contact" placeholder="Телефон или ссылка на профиль">
</div>

<button id="createCard">Добавить карточку</button>

<script>
const photosInput = document.getElementById('photos');
const preview = document.getElementById('preview');
const catalog = document.getElementById('catalogContainer');

let cardsData = JSON.parse(localStorage.getItem('housingCards')) || [];

// Функция отображения карточек
function renderCards() {
  catalog.innerHTML = '';
  cardsData.forEach(cardData => {
    const card = document.createElement('div');
    card.className = 'card';

    if (cardData.photos.length) {
      const mainImg = document.createElement('img');
      mainImg.src = cardData.photos[0];
      card.appendChild(mainImg);
    }

    const h3 = document.createElement('h3');
    h3.textContent = cardData.title;
    card.appendChild(h3);

    const desc = document.createElement('p');
    desc.textContent = cardData.description;
    card.appendChild(desc);

    const pPrice = document.createElement('p');
    pPrice.innerHTML = `<strong>Цена:</strong> ${cardData.price}`;
    card.appendChild(pPrice);

    const pLocation = document.createElement('p');
    pLocation.innerHTML = `<strong>Локация:</strong> ${cardData.location}`;
    card.appendChild(pLocation);

    const pContact = document.createElement('p');
    pContact.innerHTML = `<strong>Контакты:</strong> ${cardData.contact}`;
    card.appendChild(pContact);

    if (cardData.photos.length > 1) {
      const galleryDiv = document.createElement('div');
      galleryDiv.className = 'gallery';
      cardData.photos.slice(1).forEach(photo => {
        const img = document.createElement('img');
        img.src = photo;
        galleryDiv.appendChild(img);
      });
      card.appendChild(galleryDiv);
    }

    const waBtn = document.createElement('a');
    waBtn.href = 'https://wa.me/123456789';
    waBtn.target = '_blank';
    waBtn.textContent = 'WhatsApp';
    waBtn.className = 'button';
    card.appendChild(waBtn);

    const tgBtn = document.createElement('a');
    tgBtn.href = 'https://t.me/username';
    tgBtn.target = '_blank';
    tgBtn.textContent = 'Telegram';
    tgBtn.className = 'button';
    card.appendChild(tgBtn);

    catalog.appendChild(card);
  });
}

// Превью фото перед загрузкой
photosInput.addEventListener('change', () => {
  preview.innerHTML = '';
  Array.from(photosInput.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
});

// Добавление новой карточки
document.getElementById('createCard').addEventListener('click', () => {
  const title = document.getElementById('title').value.trim();
  const description = document.getElementById('description').value.trim();
  const price = document.getElementById('price').value.trim();
  const location = document.getElementById('location').value.trim();
  const contact = document.getElementById('contact').value.trim();

  if (!title || !description || !price || !location || !contact) {
    alert("Пожалуйста, заполните все поля!");
    return;
  }

  const photos = Array.from(photosInput.files).map(file => URL.createObjectURL(file));

  cardsData.push({title, description, price, location, contact, photos});
  localStorage.setItem('housingCards', JSON.stringify(cardsData));

  renderCards();

  document.getElementById('title').value = '';
  document.getElementById('description').value = '';
  document.getElementById('price').value = '';
  document.getElementById('location').value = '';
  document.getElementById('contact').value = '';
  preview.innerHTML = '';
  photosInput.value = '';
});

renderCards();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аренда недвижимости</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.back {
  color: #f5d7b2;
  text-decoration: none;
  margin-right: 15px;
  font-size: 14px;
}

/* CONTAINER */
.container {
  padding: 15px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  transition: transform 0.2s ease;
}

.card:active {
  transform: scale(0.98);
}

.card img {
  width: 100%;
  height: auto;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* TEXT */
.title {
  font-size: 18px;
  margin-bottom: 5px;
}

.desc {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 10px;
}

.price {
  color: #f5d7b2;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="header">
  <a class="back" href="../index.html">← Назад</a>
  <div>Аренда недвижимости</div>
</div>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/400x250" alt="">
    <div class="title">Студия у моря</div>
    <div class="desc">300м до пляжа, новый ремонт</div>
    <div class="price">$400 / месяц</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x250" alt="">
    <div class="title">1-bedroom квартира</div>
    <div class="desc">центр города, балкон</div>
    <div class="price">$550 / месяц</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x250" alt="">
    <div class="title">Дом с бассейном</div>
    <div class="desc">2 этажа, тихий район</div>
    <div class="price">$900 / месяц</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x250" alt="">
    <div class="title">Бунгало</div>
    <div class="desc">зелёная территория, рядом кафе</div>
    <div class="price">$300 / месяц</div>
  </div>

</div>

</body>
</html>

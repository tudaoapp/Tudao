<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экскурсии</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
}

.header {
  display: flex;
  align-items: center;
  padding: 15px;
}

.back {
  color: #f5d7b2;
  text-decoration: none;
  margin-right: 15px;
}

.container {
  padding: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.title {
  font-size: 18px;
  margin: 5px 0;
}

.desc {
  font-size: 14px;
  opacity: 0.7;
}

.price {
  margin-top: 5px;
  color: #f5d7b2;
}

/* КНОПКИ */
.buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.btn {
  flex: 1;
  text-align: center;
  padding: 8px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  margin: 0 5px;
  color: #fff;
}

.whatsapp {
  background: #25D366;
}

.telegram {
  background: #0088cc;
}
</style>

</head>
<body>

<div class="header">
  <a class="back" href="../index.html">← Назад</a>
  <div>Экскурсии</div>
</div>

<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
    <div class="title">Острова и снорклинг</div>
    <div class="desc">Лодка, кораллы, обед включён</div>
    <div class="price">$25</div>

    <div class="buttons">
      <a href="https://wa.me/84365331907" class="btn whatsapp">WhatsApp</a>
      <a href="https://t.me/trustasia" class="btn telegram">Telegram</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    <div class="title">Водопады и джунгли</div>
    <div class="desc">Природа, купание, треккинг</div>
    <div class="price">$20</div>

    <div class="buttons">
      <a href="https://wa.me/84365331907" class="btn whatsapp">WhatsApp</a>
      <a href="https://t.me/trustasia" class="btn telegram">Telegram</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d">
    <div class="title">Обзорная экскурсия</div>
    <div class="desc">Лучшие локации и панорамы</div>
    <div class="price">$15</div>

    <div class="buttons">
      <a href="https://wa.me/84365331907" class="btn whatsapp">WhatsApp</a>
      <a href="https://t.me/trustasia" class="btn telegram">Telegram</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
    <div class="title">Морская рыбалка</div>
    <div class="desc">Выход в море с лодкой</div>
    <div class="price">$30</div>

    <div class="buttons">
      <a href="https://wa.me/84365331907" class="btn whatsapp">WhatsApp</a>
      <a href="https://t.me/trustasia" class="btn telegram">Telegram</a>
    </div>
  </div>

</div>

</body>
</html>

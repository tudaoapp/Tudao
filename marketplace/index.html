<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Маркетплейс</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #111;
  color: #fff;
}

.header {
  display: flex;
  align-items: center;
  padding: 15px;
}

.back {
  color: #f5d7b2;
  text-decoration: none;
  margin-right: 15px;
}

.container {
  padding: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.title {
  font-size: 18px;
  margin: 5px 0;
}

.desc {
  font-size: 14px;
  opacity: 0.7;
}

.price {
  margin-top: 5px;
  color: #f5d7b2;
}

/* КНОПКИ */
.buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

.btn {
  flex: 1;
  text-align: center;
  padding: 8px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 14px;
  margin: 0 5px;
  color: #fff;
}

.whatsapp {
  background: #25D366;
}

.telegram {
  background: #0088cc;
}
</style>

</head>

    </div>
  </div>

  <div class="card">

    <div class="title">Футболка Oversize</div>
    <div class="desc">Хлопок, премиум качество</div>
    <div class="price">$15</div>

    <div class="buttons">

      <a href="https://t.me/trustasia" class="btn telegram">Telegram</a>

    <div class="desc">Удобные для повседневки</div>

    <div class="buttons">

      <a href="https://t.me/trustasia" class="btn telegram">Telegram</a>
    </div>
  </div>

  <div class="card">

      <a href="https://t.me/trustasia" class="btn telegram">Telegram</a>

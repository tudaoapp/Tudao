<!DOCTYPE html>
<html>
<head>
  <title>Tudao</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
      color: white;
    }

    header {
      padding: 25px;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 20px;
      font-size: 18px;
      backdrop-filter: blur(10px);
      text-decoration: none;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card span {
      font-size: 22px;
    }
  </style>
</head>

<body>

<header>🚀 Tudao</header>

<div class="container">

  <div class="grid">

    <a class="card" href="#">
      🏠 Аренда жилья <span>→</span>
    </a>

    <a class="card" href="#">
      🏢 Аренда квартир <span>→</span>
    </a>

    <a class="card" href="#">
      🏍 Аренда байков <span>→</span>
    </a>

    <a class="card" href="marketplace.html">
      🛍 Marketplace <span>→</span>
    </a>

    <a class="card" href="https://t.me/ТВОЙ_ЮЗЕРНЕЙМ">
      💬 Поддержка <span>→</span>
    </a>

  </div>

</div>

</body>
</html>

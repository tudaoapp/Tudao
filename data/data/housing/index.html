<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аренда жилья</title>

<style>
body { margin:0; font-family:Arial,sans-serif; background:#0d0d0d; color:white; }
.container { padding:15px; }
.title { font-size:24px; margin-bottom:15px; text-align:center; }
.cards { display:grid; gap:15px; }
.card { background:#1a1a1a; border-radius:15px; overflow:hidden; }
.card img { width:100%; height:180px; object-fit:cover; }
.card-content { padding:12px; }
.card-title { font-size:18px; margin-bottom:5px; }
.price { color:#00ffcc; margin-bottom:10px; }
.buttons { display:flex; gap:10px; }
.btn { flex:1; padding:10px; border-radius:10px; text-align:center; text-decoration:none; color:white; font-size:14px; }
.tg { background:#2AABEE; }
.wa { background:#25D366; }
</style>
</head>
<body>
<div class="container">
  <div class="title">🏠 Аренда жилья</div>
  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <div class="card-content">
        <div class="card-title">Вилла у моря</div>
        <div class="price">$1200 / месяц</div>
        <div class="buttons">
          <a class="btn tg" href="https://t.me/trustasia?text=Интересует%20вилла%20у%20моря">Telegram</a>
          <a class="btn wa" href="https://wa.me/84365331907?text=Интересует%20вилла%20у%20моря">WhatsApp</a>
        </div>
      </div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688">
      <div class="card-content">
        <div class="card-title">Апартаменты 1 спальня</div>
        <div class="price">$500 / месяц</div>
        <div class="buttons">
          <a class="btn tg" href="https://t.me/trustasia?text=Интересуют%20апартаменты%201%20спальня">Telegram</a>
          <a class="btn wa" href="https://wa.me/84365331907?text=Интересуют%20апартаменты%201%20спальня">WhatsApp</a>
        </div>
      </div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb">
      <div class="card-content">
        <div class="card-title">Бунгало в Онланге</div>
        <div class="price">$400 / месяц</div>
        <div class="buttons">
          <a class="btn tg" href="https://t.me/trustasia?text=Интересует%20бунгало%20Онланг">Telegram</a>
          <a class="btn wa" href="https://wa.me/84365331907?text=Интересует%20бунгало%20Онланг">WhatsApp</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
